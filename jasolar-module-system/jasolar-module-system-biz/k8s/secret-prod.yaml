# 生产环境敏感信息配置
# 注意：实际部署时需要使用 base64 编码的值

---
# Oracle 数据库密码 - 生产环境
apiVersion: v1
kind: Secret
metadata:
  name: oracle-prod-secret
  namespace: jasolar
type: Opaque
data:
  # echo -n "JA_9BuD_2Get" | base64
  # 实际值：SkFfOUJ1RF8yR2V0
  ORACLE_PASSWORD: SkFfOUJ1RF8yR2V0

---
# Redis 密码 - 生产环境
apiVersion: v1
kind: Secret
metadata:
  name: redis-prod-secret
  namespace: jasolar
type: Opaque
data:
  # 生产环境 Redis 密码 (base64 编码)
  # echo -n "123456" | base64
  # 实际值：MTIzNDU2
  redis-password: MTIzNDU2

