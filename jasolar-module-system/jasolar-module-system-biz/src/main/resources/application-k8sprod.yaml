server:
  # Gzip压缩配置 - 减少大数据传输时间（2MB压缩后约200-400KB）
  compression:
    enabled: true                       # 启用响应压缩
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 1024             # 最小压缩大小1KB

spring:
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB        # 单个文件最大大小，默认1MB，调整为50MB
      max-request-size: 50MB     # 整个请求最大大小，默认10MB，调整为50MB
      file-size-threshold: 2KB   # 文件写入磁盘的阈值，默认0
      location: /tmp             # 临时文件存储位置
      enabled: true              # 启用multipart支持
      resolve-lazily: false     # 是否延迟解析multipart请求
  # Web 资源配置 - 排除 /actuator 路径，避免被静态资源处理器拦截
  web:
    resources:
      # 禁用默认的静态资源映射，或者确保 /actuator 路径不被处理
      add-mappings: true
      # 明确指定静态资源路径，不包含 /actuator
      static-locations: classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/
  # Tomcat 线程池配置
  tomcat:
    threads:
      max: 500          # 大幅增加到500，支持更高并发（300线程压测需要更多线程）
      min-spare: 50     # 增加最小空闲线程数，减少线程创建开销
    max-connections: 8192  # 最大连接数
    accept-count: 1000  # 等待队列长度，大幅增加到1000，避免连接被拒绝
    connection-timeout: 20000  # 连接超时时间(毫秒)
    # 性能优化配置
    processor-cache: 200  # 处理器缓存，提高性能
    max-keep-alive-requests: 100  # 每个连接最大请求数
    # 线程池性能优化
    thread-name-prefix: "http-nio-"  # 线程名称前缀
    keep-alive-timeout: 60000  # Keep-Alive超时时间
    # Gzip压缩配置 - 大幅减少数据传输时间
    compression: on                    # 启用压缩
    compressible-mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
    compression-min-size: 1024          # 最小压缩大小1KB，小于此值不压缩
  
  # Cache 配置项
  cache:
    type: REDIS
    redis:
      time-to-live: 1h # 设置过期时间为 1 小时
  
  # Redis 配置 - 生产环境使用双活主从配置
  data:
    redis:
      repositories:
        enabled: false # 项目未使用到 Spring Data Redis 的 Repository，所以直接禁用，保证启动速度
      host: redis-prod-master-svc.jasolar.svc.cluster.local # redis生产环境master地址
      port: 6379 # redis端口
      database: 1 # redis索引
      password: ${REDIS_PASSWORD:} # redis密码，通过环境变量配置
  
  # 数据源配置 - 生产环境数据库
  datasource:
    # 关闭 Druid 的 JMX MBean 注册，避免容器环境下的 cgroup Metrics 兼容性问题
    druid:
      mbean-registered: false

    dynamic: # 多数据源配置
      primary: master # 设置默认的数据源或者数据源组,默认值即为 master
      strict: false # 严格匹配数据源,默认false. true未匹配到指定数据源时抛异常,false使用默认数据源
      datasource:
        master:
          url: jdbc:oracle:thin:@jabxdb-scan.jasolar.com:1521/plnpdb
          username: JASOLAR_BUDGET
          password: ${DB_PASSWORD:JA_9BuD_2Get}  # 支持环境变量，默认值为 JA_9BuD_2Get
          driver-class-name: oracle.jdbc.OracleDriver
          # Oracle Schema配置，设置默认schema（连接建立后执行）
          connection-init-sql: ALTER SESSION SET CURRENT_SCHEMA = ${DB_SCHEMA:JASOLAR_BUDGET}
          # Oracle特定配置 - 优化支持100线程并发
          druid:
            validation-query: SELECT 1 FROM DUAL
            validation-query-timeout: 3000
            max-active: 400  # 最大连接数，支持100线程并发（100线程 * 4倍）
            min-idle: 150    # 最小空闲连接数，保持足够的连接池预热，减少连接创建开销
            initial-size: 150  # 初始连接数，启动时预热更多连接，提高响应速度
            max-wait: 30000  # 最大等待时间30秒
            # 连接回收配置
            time-between-eviction-runs-millis: 300000  # 缩短为5分钟，更及时回收无效连接
            min-evictable-idle-time-millis: 900000  # 缩短为15分钟，空闲连接更快回收
            max-evictable-idle-time-millis: 1800000  # 最大空闲时间30分钟
            # 性能优化配置
            test-on-borrow: false  # 获取连接时不检测，提高性能
            test-while-idle: true   # 空闲时检测连接有效性
            test-on-return: false  # 归还连接时不检测，提高性能
            # PSCache配置（Oracle预编译语句缓存）
            pool-prepared-statements: true  # 开启PSCache，提高SQL执行效率
            max-pool-prepared-statement-per-connection-size: 100  # 增加PSCache大小，支持更多预编译语句
            # 连接池性能优化
            remove-abandoned: true  # 自动回收超时连接，防止连接泄漏
            remove-abandoned-timeout: 1800  # 30分钟超时，自动回收长时间未关闭的连接
            log-abandoned: false  # 不记录废弃连接的日志，提高性能
            # 连接获取优化
            phy-timeout-millis: 28800000  # 物理连接超时8小时（Oracle默认）
            # 连接池监控（可选，生产环境建议开启）
            filters: stat,wall  # 开启统计和SQL防火墙（如果需要监控可以开启）
            # 连接池统计配置
            stat:
              enabled: true  # 开启统计
              log-slow-sql: true  # 记录慢SQL
              slow-sql-millis: 2000  # 慢SQL阈值2秒
              merge-sql: true  # 合并相同SQL的统计
        syn-ehr:
          url: jdbc:oracle:thin:@jabxdb-scan.jasolar.com:1521/plnpdb
          username: JASOLAR_BUDGET
          password: ${DB_PASSWORD:JA_9BuD_2Get}  # 支持环境变量，默认值为 JA_9BuD_2Get
          driver-class-name: oracle.jdbc.OracleDriver
          # Oracle Schema配置，设置默认schema（连接建立后执行）
          connection-init-sql: ALTER SESSION SET CURRENT_SCHEMA = ${DB_SCHEMA:JASOLAR_BUDGET}
          # Oracle特定配置 - 优化支持100线程并发
          druid:
            validation-query: SELECT 1 FROM DUAL
            validation-query-timeout: 3000
            max-active: 400  # 最大连接数，支持100线程并发（100线程 * 4倍）
            min-idle: 150    # 最小空闲连接数，保持足够的连接池预热
            initial-size: 150  # 初始连接数，启动时预热更多连接
            max-wait: 30000
            # 连接回收配置
            time-between-eviction-runs-millis: 300000  # 缩短为5分钟
            min-evictable-idle-time-millis: 900000  # 缩短为15分钟
            max-evictable-idle-time-millis: 1800000  # 最大空闲时间30分钟
            # 性能优化配置
            test-on-borrow: false  # 获取连接时不检测，提高性能
            test-while-idle: true   # 空闲时检测连接有效性
            test-on-return: false  # 归还连接时不检测，提高性能
            # PSCache配置
            pool-prepared-statements: true  # 开启PSCache
            max-pool-prepared-statement-per-connection-size: 100  # 增加PSCache大小
            # 连接池性能优化
            remove-abandoned: true  # 自动回收超时连接
            remove-abandoned-timeout: 1800  # 30分钟超时
            log-abandoned: false  # 不记录废弃连接的日志，提高性能
            # 连接获取优化
            phy-timeout-millis: 28800000  # 物理连接超时8小时
  flyway:
    enabled: false
  
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: true # 设置 LocalDateTime 的格式，使用时间戳
      WRITE_DATE_TIMESTAMPS_AS_NANOSECONDS: false # 设置不使用 nanoseconds 的格式。例如说 1611460870.401，而是直接 1611460870401
      WRITE_DURATIONS_AS_TIMESTAMPS: true # 设置 Duration 的格式，使用时间戳
      FAIL_ON_EMPTY_BEANS: false # 允许序列化无属性的 Bean
    deserialization:
      FAIL_ON_UNKNOWN_PROPERTIES: false


