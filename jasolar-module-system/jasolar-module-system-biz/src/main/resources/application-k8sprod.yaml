# JWT配置
jwt:
  tokenKey: jasolar
  subject: jasolar

# Session配置
jasolar-session:
  type: Bearer
  expire-period: 5

# MyBatis配置 - 解决Oracle数据库null值处理问题
mybatis:
  configuration:
    # 设置null值的JDBC类型为VARCHAR，解决Oracle的ORA-17004错误
    jdbc-type-for-null: VARCHAR
    # 启用驼峰命名转换
    map-underscore-to-camel-case: true
    # 启用延迟加载
    lazy-loading-enabled: true
    # 设置积极的延迟加载
    aggressive-lazy-loading: false

# MyBatis Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl  # 输出 SQL 到日志，排查后可改回 NoLoggingImpl
  global-config:
    db-config:
      # Oracle数据库使用INPUT模式
      id-type: ASSIGN_ID
      # 逻辑删除配置
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false

logging:
  file:
    name: /app/logs/system-service/system-service.log
  level:
    default: INFO
    com.jasolar.mis: INFO
    com.jasolar.mis.module.system: INFO
    com.jasolar.mis.module.system.dal: INFO
    # 查询相关Service的日志级别提升为WARN，减少日志输出提高性能
    com.jasolar.mis.module.system.service.budget.query: WARN
    com.jasolar.mis.module.system.service.budget.helper: WARN  # HelperService也提升为WARN
    org.apache.ibatis: DEBUG  # 打印 SQL 与参数，排查后可改回 WARN
    org.springframework: INFO
    # 将 DruidDriver 的日志级别提升为 ERROR，屏蔽启动时的 MBean 注册 WARN 堆栈
    com.alibaba.druid.proxy.DruidDriver: ERROR

# Swagger配置
springdoc:
  api-docs:
    enabled: true # 是否开启 Swagger 接文档的元数据
    path: /v3/api-docs
  swagger-ui:
    enabled: true # 是否开启 Swagger 文档的官方 UI 界面
    path: /swagger-ui
  default-flat-param-object: true

# 安全配置
jasolar:
  info:
    base-package: com.jasolar.mis.module.system  # 确保包扫描正确
  security:
    permit-all-urls:
      - /admin-api/**  # 允许 Feign 调用组织管理接口
      - /client-api/**
      - /actuator/**  # 允许 Actuator 端点访问
  # 访问日志配置 - 性能优化
  access-log:
    enable: true  # 保持启用，但排除测试接口
    excludes: "/**/*page,/**/list*,/**/get*,/budget/test/**"  # 排除测试接口，减少日志开销
  debug: false  # 关闭debug模式，减少日志输出

scheduler:
  project-sync:
    enabled: true
    cron: 0 0 0 * * ?
  subject-sync:
    enabled: true
    cron: 0 0 2 * * ?
  organization-sync:
    enabled: true
    cron: 0 0 4 * * ?
  manage-org-sync:
    enabled: true
    cron: 0 0 6 * * ?
  auth-project-sync:
    enabled: true
    cron: 0 0 8 * * ?

# 数据集成 Schema 配置
schemas:
  dataIntegration: DATAINTEGRATION

erp:
  oracle:
    url: ${ERP_ORACLE_URL:jdbc:oracle:thin:@172.28.8.182:1521/prod}
    username: ${ERP_ORACLE_USERNAME:cuxread}
    password: ${ERP_ORACLE_PASSWORD:1234qwer}
    driver-class-name: oracle.jdbc.OracleDriver

# 预算科目编码配置
budget:
  # 预算校验开关（生产环境：保持原有预算校验逻辑）
  validation:
    mode: 1  # 1=执行预算校验（默认），0=跳过校验
  subject-code:
    # 科目编码前缀白名单列表
    # 如果科目编码以这些前缀开头，将继续执行后续流程
    # 如果科目编码不以这些前缀开头，将直接返回合并后的参数，不执行后续流程
    # 配置格式：用逗号分隔多个前缀
    whitelist-prefixes:
      - "5101"
      - "6601"
      - "6602"
      - "M5101"
      - "M5201"
      - "6401014"
      - "64010199"
      - "64010150"

# Spring Boot Actuator 健康检查配置（用于 K8S / Nginx 探针访问 /actuator/health）
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
      # 确保 Actuator 端点不被静态资源处理器拦截
      path-mapping:
        health: health
  endpoint:
    health:
      enabled: true
      probes:
        enabled: true
      show-details: always
  metrics:
    binders:
      processor:
        enabled: false  # 禁用 CPU 指标采集，避免容器 cgroup 相关异常
  health:
    db:
      enabled: true
    datasource:
      enabled: true

