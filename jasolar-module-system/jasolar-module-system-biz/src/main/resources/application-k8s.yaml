    url: ${ERP_ORACLE_URL:jdbc:oracle:thin:@172.28.8.182:1521/prod}
    username: ${ERP_ORACLE_USERNAME:cuxread}
    password: ${ERP_ORACLE_PASSWORD:1234qwer}
    driver-class-name: oracle.jdbc.OracleDriver

# 预算科目编码配置
budget:
  oa:
    python-run-url: http://172.28.49.16:18080/run  # 测试环境 Python 服务地址
  # 预算校验开关（测试环境：跳过预算校验，直接扣减/占预算）
  validation:
    mode: 1  # 0=跳过校验，非0=执行校验
  subject-code:
    # 科目编码前缀白名单列表
    # 如果科目编码为这些前缀开头，将继续执行后续流程
    # 如果科目编码不以这些前缀开头，将直接返回合并后的参数，不执行后续流程
    # 配置格式：用逗号分隔多个前缀
    whitelist-prefixes:
      - "5101"
      - "6601"
      - "6602"
      - "M5101"
      - "M5201"
      - "6401014"
      - "64010199"
      - "64010150"

# Spring Boot Actuator 健康检查配置（用于 K8S / Nginx 探针访问 /actuator/health）
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true