# JWT配置
jwt:
  tokenKey: jasolar
  subject: jasolar

# Session配置
jasolar-session:
  type: Bearer
  expire-period: 5

# MyBatis配置 - 解决Oracle数据库null值处理问题
mybatis:
  configuration:
    # 设置null值的JDBC类型为VARCHAR，解决Oracle的ORA-17004错误
    jdbc-type-for-null: VARCHAR
    # 启用驼峰命名转换
    map-underscore-to-camel-case: true
    # 启用延迟加载
    lazy-loading-enabled: true
    # 设置积极的延迟加载
    aggressive-lazy-loading: false

# MyBatis Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl # 不输出SQL日志
  global-config:
    db-config:
      # Oracle数据库使用INPUT模式
      id-type: ASSIGN_ID
      # 逻辑删除配置
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false

logging:
  file:
    name: /app/logs/system-service/system-service.log
  level:
    default: INFO
    com.jasolar.mis: DEBUG
    com.jasolar.mis.module.system: DEBUG
    com.jasolar.mis.module.system.dal: DEBUG
    org.apache.ibatis: WARN  # 改为WARN级别，只输出警告和错误，不输出SQL语句
    org.springframework: INFO

# Swagger配置
springdoc:
  api-docs:
    enabled: true # 是否开启 Swagger 接文档的元数据
    path: /v3/api-docs
  swagger-ui:
    enabled: true # 是否开启 Swagger 文档的官方 UI 界面
    path: /swagger-ui
  default-flat-param-object: true

# 安全配置
jasolar:
  info:
    base-package: com.jasolar.mis.module.system  # 确保包扫描正确
  security:
    permit-all-urls:
      - /admin-api/**  # 允许 Feign 调用组织管理接口
      - /client-api/**

scheduler:
  project-sync:
    enabled: true
    cron: 0 0 0 * * ?
  subject-sync:
    enabled: true
    cron: 0 0 2 * * ?
  organization-sync:
    enabled: true
    cron: 0 0 4 * * ?
  manage-org-sync:
    enabled: true
    cron: 0 0 6 * * ?
  auth-project-sync:
    enabled: true
    cron: 0 0 8 * * ?


