apiVersion: v1
kind: ServiceAccount
metadata:
  name: jasolar-gateway-sa
  namespace: jasolar
  labels:
    app: jasolar-gateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jasolar-gateway-role
  labels:
    app: jasolar-gateway
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jasolar-gateway-role-binding
  labels:
    app: jasolar-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jasolar-gateway-role
subjects:
- kind: ServiceAccount
  name: jasolar-gateway-sa
  namespace: jasolar 