apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  labels:
    app: jasolar-gateway
  name: jasolar-gateway
  namespace: jasolar
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: jasolar-gateway
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations: {}
      labels:
        app: jasolar-gateway
    spec:
      imagePullSecrets:
        - name: harbor-secret
      serviceAccountName: jasolar-gateway-sa
      containers:
        - args:
            - '--spring.config.additional-location=file:/config/'
          env:
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: redis-password
                  name: redis-secret
          image: 'docker.jasolar.com/budget/jasolar-gateway:1.0.0'
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /actuator/health
              port: 8089
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          name: jasolar-gateway
          ports:
            - containerPort: 8089
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /actuator/health
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources: {}
          volumeMounts:
            - mountPath: /config
              name: config
      volumes:
        - name: config
          configMap:
            defaultMode: 420
            name: gateway-config
